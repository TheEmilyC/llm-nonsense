services:
  app:
    build: .
    network_mode: host
    env_file:
      - .env
    environment:
      # Override DATABASE_URL with an absolute path inside the container.
      # The actual file lives in the 'db-data' volume below so it persists
      # across restarts and container rebuilds.
      DATABASE_URL: "file:/app/data/llm-nonsense.db"
    restart: unless-stopped
    volumes:
      - ./data:/app/data
